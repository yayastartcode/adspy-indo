<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇮🇩 AdSpy Indo - Winning Digital Product Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #020617; --surface: #0f172a; --card: #0f172a; --border: #1e293b;
      --text: #f1f5f9; --text-muted: #64748b; --primary: #3b82f6;
      --red: #ef4444; --green: #22c55e; --yellow: #eab308; --orange: #f97316;
    }
    .light {
      --bg: #f8fafc; --surface: #ffffff; --card: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --text-muted: #94a3b8;
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    a { color: var(--primary); text-decoration: none; }

    /* Layout */
    .app { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .main { flex: 1; overflow-y: auto; }
    .header { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .content { padding: 24px; }

    /* Sidebar */
    .sidebar-title { padding: 20px 16px 12px; font-size: 18px; font-weight: 700; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 0 8px; }
    .sidebar-label { padding: 8px 0 4px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }
    .nav-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 10px 12px; margin-bottom: 2px; border: none; border-radius: 12px; background: transparent; color: var(--text); font-size: 14px; cursor: pointer; text-align: left; transition: background 0.15s; }
    .nav-btn:hover { background: var(--border); }
    .nav-btn.active { background: #1e3a8a; color: #93c5fd; }
    .nav-btn .date { font-size: 11px; color: var(--text-muted); }
    .nav-btn .delete-btn { opacity: 0; color: var(--red); cursor: pointer; font-size: 12px; transition: opacity 0.15s; }
    .nav-btn:hover .delete-btn { opacity: 1; }
    .sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }
    .add-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px; border: none; border-radius: 12px; background: transparent; color: var(--primary); font-size: 14px; font-weight: 500; cursor: pointer; }
    .add-form { padding: 12px; background: var(--border); border-radius: 12px; }
    .add-form input { width: 100%; padding: 8px 12px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
    .add-form .row { display: flex; gap: 8px; }
    .add-form .row input { flex: 1; margin-bottom: 0; }

    /* Buttons */
    .btn { padding: 8px 16px; border: none; border-radius: 12px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: var(--red); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { display: inline-flex; align-items: center; gap: 6px; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-muted); }

    /* Product list */
    .product-item { display: flex; align-items: center; justify-content: space-between; padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; cursor: pointer; transition: transform 0.15s; }
    .product-item:hover { transform: scale(1.005); }
    .product-info { flex: 1; }
    .product-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .product-rank { font-size: 13px; font-weight: 700; color: var(--text-muted); }
    .product-name { font-size: 15px; font-weight: 700; }
    .product-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 13px; color: var(--text-muted); }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .badge-red { background: #450a0a; color: #fca5a5; }
    .badge-green { background: #052e16; color: #86efac; }
    .badge-yellow { background: #422006; color: #fde047; }
    .badge-orange { background: #431407; color: #fdba74; }
    .badge-gray { background: #1e293b; color: #94a3b8; }
    .tag { padding: 2px 8px; border-radius: 6px; font-size: 11px; background: var(--border); color: var(--text-muted); }

    /* Score bar */
    .score-bar { display: flex; align-items: center; gap: 8px; min-width: 120px; }
    .score-track { flex: 1; height: 8px; border-radius: 4px; background: var(--border); }
    .score-fill { height: 8px; border-radius: 4px; transition: width 0.3s; }
    .score-value { font-size: 14px; font-weight: 700; min-width: 28px; text-align: right; }

    /* Sort/Filter bar */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 13px; outline: none; }
    .toolbar label { font-size: 12px; color: var(--text-muted); }

    /* Detail view */
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 0; border: none; background: none; color: var(--primary); font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 16px; }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; }
    .detail-score { font-size: 48px; font-weight: 700; text-align: right; }
    .detail-score small { display: block; font-size: 12px; color: var(--text-muted); font-weight: 400; }
    .breakdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .breakdown-card { padding: 20px; }
    .breakdown-label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    .breakdown-value { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .breakdown-bar { display: flex; align-items: center; gap: 8px; }
    .breakdown-track { flex: 1; height: 6px; border-radius: 3px; background: var(--border); }
    .breakdown-fill { height: 6px; border-radius: 3px; }
    .breakdown-points { font-size: 12px; font-weight: 500; }

    /* Price tags */
    .price-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .price-tag { padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 500; background: var(--border); color: var(--text-muted); border: 1px solid var(--border); }
    .price-tag.primary { background: rgba(37,99,235,0.1); color: var(--primary); border-color: var(--primary); }

    /* Ad samples */
    .ad-sample { padding: 16px; background: var(--border); border-radius: 12px; margin-bottom: 12px; }
    .ad-meta { display: flex; gap: 12px; margin-bottom: 8px; font-size: 12px; }
    .ad-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }

    /* Overview table */
    .table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .table th { text-align: left; padding: 12px 16px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    .table td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .table tr:hover td { background: var(--border); }
    .table tr { cursor: pointer; }

    /* Progress */
    .progress-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--border); border-radius: 12px; font-size: 13px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text-muted); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty { text-align: center; padding: 48px; color: var(--text-muted); }
    .empty p { margin-top: 8px; font-size: 14px; }

    /* Theme toggle */
    .theme-btn { padding: 8px; border: none; border-radius: 12px; background: var(--border); color: var(--text); cursor: pointer; font-size: 16px; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .breakdown-grid { grid-template-columns: 1fr; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-title">🔍 Keywords</div>
      <div class="sidebar-nav">
        <button class="nav-btn active" onclick="showOverview()" id="nav-overview">📊 Overview</button>
        <div class="sidebar-label">Keywords</div>
        <div id="keyword-nav"></div>
      </div>
      <div class="sidebar-footer">
        <div id="add-keyword-form" class="hidden">
          <div class="add-form">
            <input type="text" id="new-keyword" placeholder="Keyword..." onkeydown="if(event.key==='Enter')addKeyword()">
            <div class="row">
              <input type="number" id="new-max" value="2000" placeholder="Max results">
              <button class="btn btn-primary btn-sm" onclick="addKeyword()">Add</button>
              <button class="btn btn-sm" onclick="toggleAddForm()" style="background:var(--border);color:var(--text-muted)">✕</button>
            </div>
          </div>
        </div>
        <button class="add-btn" id="add-keyword-btn" onclick="toggleAddForm()">+ Add Keyword</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="header">
        <div>
          <h1 style="font-size:20px;font-weight:700">🇮🇩 AdSpy Indo</h1>
          <p style="font-size:13px;color:var(--text-muted)">Winning Digital Product Intelligence</p>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
      </div>
      <div class="content" id="content">
        <!-- Dynamic content here -->
      </div>
    </div>
  </div>

  <script>
    const API = 'api';
    let keywords = [];
    let activeTab = 'overview';
    let currentData = null;

    // API calls
    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API}/${path}`, opts);
      return res.json();
    }

    // Init
    async function init() {
      keywords = await api('GET', 'keywords');
      renderNav();
      showOverview();
    }

    // Render sidebar nav
    function renderNav() {
      const nav = document.getElementById('keyword-nav');
      nav.innerHTML = keywords.map(kw => `
        <button class="nav-btn ${activeTab === kw.id ? 'active' : ''}" onclick="showKeyword('${kw.id}')">
          <span>${kw.keyword}</span>
          <span>
            ${kw.lastScrapedAt ? `<span class="date">${new Date(kw.lastScrapedAt).toLocaleDateString('id-ID', {day:'numeric',month:'short'})}</span>` : ''}
            <span class="delete-btn" onclick="event.stopPropagation();deleteKeyword('${kw.id}')">🗑</span>
          </span>
        </button>
      `).join('');
    }

    // Format price
    function formatPrice(p) {
      if (!p) return '-';
      if (p >= 1000000) return 'Rp ' + (p/1000000).toFixed(1) + 'jt';
      if (p >= 1000) return 'Rp ' + (p/1000).toFixed(0) + 'k';
      return 'Rp ' + p;
    }

    // Score color
    function scoreColor(s) {
      if (s >= 80) return 'var(--red)';
      if (s >= 65) return 'var(--green)';
      if (s >= 50) return 'var(--yellow)';
      if (s >= 35) return 'var(--orange)';
      return 'var(--text-muted)';
    }

    // Badge class
    function badgeClass(color) {
      return 'badge badge-' + color;
    }

    // Show Overview
    async function showOverview() {
      activeTab = 'overview';
      renderNav();
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('nav-overview').classList.add('active');

      const data = await api('GET', 'overview');
      const content = document.getElementById('content');

      content.innerHTML = `
        <h2 style="font-size:24px;font-weight:700;margin-bottom:24px">📊 Overview</h2>
        <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
          <div class="stat-card"><div class="stat-value" style="color:var(--primary)">${(data.totalAdsScraped||0).toLocaleString()}</div><div class="stat-label">Total Ads</div></div>
          <div class="stat-card"><div class="stat-value" style="color:#8b5cf6">${data.totalAdvertisers||0}</div><div class="stat-label">Advertisers</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--green)">${data.keywords?.length||0}</div><div class="stat-label">Keywords</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--red)">${(data.hottestProducts||[]).filter(p=>p.score>=65).length}</div><div class="stat-label">Hot Products</div></div>
        </div>
        <div class="card">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">📋 Keywords Performance</h3>
          <table class="table">
            <thead><tr><th>Keyword</th><th>Ads</th><th>Advertisers</th><th>🔥</th><th>✅</th><th>🟡</th><th>Last Scraped</th></tr></thead>
            <tbody>
              ${(data.keywords||[]).map(kw => `
                <tr onclick="showKeyword('${kw.keywordId}')">
                  <td style="font-weight:500">${kw.keyword}</td>
                  <td style="color:var(--text-muted)">${kw.totalAds}</td>
                  <td style="color:var(--text-muted)">${kw.totalAdvertisers}</td>
                  <td style="color:var(--red)">${kw.summary?.confirmedWinners||0}</td>
                  <td style="color:var(--green)">${kw.summary?.highConfidence||0}</td>
                  <td style="color:var(--yellow)">${kw.summary?.worthWatching||0}</td>
                  <td style="font-size:12px;color:var(--text-muted)">${kw.scrapedAt ? new Date(kw.scrapedAt).toLocaleString('id-ID') : 'Never'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        ${(data.hottestProducts||[]).length > 0 ? `
          <div class="card">
            <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">🔥 Hottest Products</h3>
            ${data.hottestProducts.slice(0,10).map((p,i) => `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;${i<9?'border-bottom:1px solid var(--border)':''}">
                <div style="display:flex;align-items:center;gap:12px">
                  <span style="font-size:13px;font-weight:700;color:var(--text-muted);min-width:24px">#${i+1}</span>
                  <div>
                    <div style="font-size:14px;font-weight:500">${p.advertiserName}</div>
                    <div style="font-size:12px;color:var(--text-muted)">${p.keyword||''} • ${p.niche||''} • ${formatPrice(p.commonPrice)}</div>
                  </div>
                </div>
                <span style="font-size:14px;font-weight:700;color:${scoreColor(p.score)}">${p.score}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;
    }

    // Show Keyword Results
    async function showKeyword(id) {
      activeTab = id;
      renderNav();

      const params = new URLSearchParams({ sort: 'score', order: 'desc' });
      const data = await api('GET', `results/${id}?${params}`);
      currentData = data;

      const content = document.getElementById('content');
      content.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px">
          <div>
            <h2 style="font-size:24px;font-weight:700">🔍 ${id.replace(/-/g,' ')}</h2>
            <p style="font-size:13px;color:var(--text-muted)">${data.totalAds||0} ads • ${data.totalAdvertisers||0} advertisers${data.scrapedAt ? ' • Last: '+new Date(data.scrapedAt).toLocaleString('id-ID') : ''}</p>
          </div>
          <div style="display:flex;gap:8px" id="scrape-controls">
            <button class="btn btn-primary btn-icon" onclick="startScrape('${id}')">▶ Scrape Now</button>
          </div>
        </div>
        ${data.summary ? `
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" style="color:var(--red)">${data.summary.confirmedWinners}</div><div class="stat-label">🔥 Confirmed</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--green)">${data.summary.highConfidence}</div><div class="stat-label">✅ High Conf</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--yellow)">${data.summary.worthWatching}</div><div class="stat-label">🟡 Watching</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--orange)">${data.summary.risingFast}</div><div class="stat-label">⚡ Rising</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--text-muted)">${data.summary.tooEarly}</div><div class="stat-label">⚪ Early</div></div>
          </div>
        ` : ''}
        <div class="toolbar">
          <label>Sort:</label>
          <select onchange="sortResults('${id}', this.value)" id="sort-select">
            <option value="score">Score</option>
            <option value="duration">Duration</option>
            <option value="position">Position</option>
            <option value="ads">Total Ads</option>
            <option value="price">Price</option>
          </select>
          <label>Min Score:</label>
          <select onchange="filterResults('${id}', this.value)" id="filter-select">
            <option value="">All</option>
            <option value="80">🔥 80+</option>
            <option value="65">✅ 65+</option>
            <option value="50">🟡 50+</option>
            <option value="35">⚡ 35+</option>
          </select>
        </div>
        <div id="products-list">
          ${renderProducts(data.products, id)}
        </div>
      `;
    }

    function renderProducts(products, keywordId) {
      if (!products || products.length === 0) {
        return '<div class="empty"><p style="font-size:18px">No data yet</p><p>Click "Scrape Now" to start collecting ads</p></div>';
      }
      return products.map((p, i) => `
        <div class="product-item" onclick="showDetail('${keywordId}','${encodeURIComponent(p.advertiserName)}')">
          <div class="product-info">
            <div class="product-header">
              <span class="product-rank">#${i+1}</span>
              <span class="product-name">${p.advertiserName}</span>
              <span class="${badgeClass(p.decision.color)}">${p.decision.emoji} ${p.decision.label}</span>
            </div>
            <div class="product-meta">
              <span>⏱️ ${p.longestDuration} days</span>
              <span>📊 #${p.bestPosition}</span>
              <span>📢 ${p.totalAds} ads</span>
              <span>💰 ${formatPrice(p.commonPrice)}</span>
              <span class="tag">${p.niche}</span>
              <span class="tag">${p.productType}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="score-bar">
              <div class="score-track"><div class="score-fill" style="width:${p.score}%;background:${scoreColor(p.score)}"></div></div>
              <span class="score-value" style="color:${scoreColor(p.score)}">${p.score}</span>
            </div>
            <span style="color:var(--text-muted)">›</span>
          </div>
        </div>
      `).join('');
    }

    // Sort & Filter
    async function sortResults(id, sort) {
      const minScore = document.getElementById('filter-select')?.value || '';
      const params = new URLSearchParams({ sort, order: 'desc' });
      if (minScore) params.set('minScore', minScore);
      const data = await api('GET', `results/${id}?${params}`);
      document.getElementById('products-list').innerHTML = renderProducts(data.products, id);
    }

    async function filterResults(id, minScore) {
      const sort = document.getElementById('sort-select')?.value || 'score';
      const params = new URLSearchParams({ sort, order: 'desc' });
      if (minScore) params.set('minScore', minScore);
      const data = await api('GET', `results/${id}?${params}`);
      document.getElementById('products-list').innerHTML = renderProducts(data.products, id);
    }

    // Show Detail
    async function showDetail(keywordId, advertiser) {
      const data = await api('GET', `results/${keywordId}/detail/${advertiser}`);
      if (!data || data.error) { alert('Not found'); return; }

      const content = document.getElementById('content');
      content.innerHTML = `
        <button class="back-btn" onclick="showKeyword('${keywordId}')">← Back to ${keywordId.replace(/-/g,' ')}</button>
        <div class="card">
          <div class="detail-header">
            <div>
              <h2 style="font-size:24px;font-weight:700">${data.advertiserName}</h2>
              <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
                <span class="${badgeClass(data.decision.color)}" style="font-size:13px">${data.decision.emoji} ${data.decision.label}</span>
                ${(data.niches||[]).map(n => `<span class="tag">${n}</span>`).join('')}
                ${(data.productTypes||[]).map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
            </div>
            <div class="detail-score" style="color:${scoreColor(data.score)}">${data.score}<small>/ 100</small></div>
          </div>
        </div>
        <div class="breakdown-grid">
          ${[
            {label:'⏱️ Duration', value: data.longestDuration+' days', points: data.scoreBreakdown.duration, max: 40, color: 'var(--primary)'},
            {label:'📊 Best Position', value: '#'+data.bestPosition, points: data.scoreBreakdown.position, max: 35, color: '#8b5cf6'},
            {label:'📢 Total Ads', value: data.totalAds, points: data.scoreBreakdown.adCount, max: 25, color: 'var(--green)'},
          ].map(item => `
            <div class="card breakdown-card">
              <div class="breakdown-label" style="color:${item.color}">${item.label}</div>
              <div class="breakdown-value">${item.value}</div>
              <div class="breakdown-bar">
                <div class="breakdown-track"><div class="breakdown-fill" style="width:${(item.points/item.max)*100}%;background:${item.color}"></div></div>
                <span class="breakdown-points" style="color:${item.color}">${item.points}/${item.max}</span>
              </div>
            </div>
          `).join('')}
        </div>
        ${(data.prices||[]).length > 0 ? `
          <div class="card">
            <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">💰 Price Points</h3>
            <div class="price-list">
              ${data.prices.map((p,i) => `<span class="price-tag ${i===0?'primary':''}">${formatPrice(p)} ${i===0?'⭐':''}</span>`).join('')}
            </div>
          </div>
        ` : ''}
        <div class="card">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">📢 Ads (${(data.ads||[]).length})</h3>
          ${(data.ads||[]).map(ad => `
            <div class="ad-sample">
              <div class="ad-meta">
                <span style="color:var(--primary);font-weight:500">Position #${ad.searchPosition||'-'}</span>
                ${ad.startDate ? `<span>Started: ${ad.startDate}</span>` : ''}
                ${ad.extractedPrice ? `<span style="color:var(--green);font-weight:500">${formatPrice(ad.extractedPrice)}</span>` : ''}
                ${(ad.platforms||[]).map(p => `<span>${p}</span>`).join('')}
              </div>
              <div class="ad-text">${(ad.adText||'').replace(/</g,'&lt;')}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // Scraping (requires Node.js scraper)
    function startScrape(id) {
      alert('Scraping membutuhkan Node.js scraper.\\n\\nJalankan di Command Prompt:\\n\\ncd scraper\\nnode scrape.js ' + id + '\\n\\nSetelah selesai, refresh halaman ini.');
    }

    // Add keyword
    async function addKeyword() {
      const keyword = document.getElementById('new-keyword').value.trim();
      const maxResults = parseInt(document.getElementById('new-max').value) || 2000;
      if (!keyword) return;
      try {
        await api('POST', 'keywords', { keyword, maxResults });
        document.getElementById('new-keyword').value = '';
        toggleAddForm();
        keywords = await api('GET', 'keywords');
        renderNav();
      } catch(e) { alert('Failed to add keyword'); }
    }

    // Delete keyword
    async function deleteKeyword(id) {
      if (!confirm('Delete keyword and its data?')) return;
      await api('DELETE', `keywords/${id}`);
      keywords = await api('GET', 'keywords');
      renderNav();
      if (activeTab === id) showOverview();
    }

    // Toggle add form
    function toggleAddForm() {
      const form = document.getElementById('add-keyword-form');
      const btn = document.getElementById('add-keyword-btn');
      form.classList.toggle('hidden');
      btn.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) document.getElementById('new-keyword').focus();
    }

    // Theme toggle
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      document.documentElement.classList.toggle('light');
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Load theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.classList.remove('dark');
      document.documentElement.classList.add('light');
      document.getElementById('theme-btn').textContent = '🌙';
    }

    // Start
    init();
  </script>
</body>
</html>
